<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/framework.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/mobile-style.css" />
    <script src="./scripts/script.js"></script>
    <title>Jester's Tic Tac Toe</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="dashboard">
          <div class="dashboard__part dashboard__left"></div>
          <div class="dashboard__part dashboard__main"></div>
          <div class="dashboard__part dashboard__right"></div>
        </div>
        <div class="dashboard-footer">
          <div class="dashboard-footer__part dashboard-footer__left"></div>
          <div class="dashboard-footer__part dashboard-footer__main">
            <h1
              class="dashboard-footer__header _text _text--bold _text--body-font --context-rg"
            >
              Sebvu's Tic Tac Toe
            </h1>
          </div>
          <div class="dashboard-footer__part dashboard-footer__right"></div>
        </div>
      </header>
      <div class="main-container">
        <div class="game-board">
          <div class="game-board__cell">
            <a class="game-board__cell-one"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-two"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-three"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-four"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-five"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-six"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-seven"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-eight"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-nine"></a>
          </div>
        </div>
      </div>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
