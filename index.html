<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/framework.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/mobile-style.css" />
    <script src="./scripts/script.js" defer></script>
    <title>Jester's Tic Tac Toe</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="dashboard">
          <div class="dashboard__part dashboard__left"></div>
          <div class="dashboard__part dashboard__main --context-md">
            <div class="profile-left">
              <div class="profile-left__image-container-container">
                <div class="profile-left__image-container">
                  <img
                    src="./assets/icons/player-one.png"
                    class="profile-left__image"
                    alt="Player One Icon"
                  />
                </div>
              </div>
              <div
                class="profile-left__user-name-container _text _text--bold _text--normal-font"
              >
                <p class="profile-left__letter">X</p>
                <p class="profile-left__user-name">N/A</p>
              </div>
              <div class="profile-left__score-container">
                <p
                  class="profile-left__score _text _text--bold _text--normal-font --context-rg"
                >
                  0
                </p>
              </div>
            </div>
            <div class="game-status">
              <p class="game-status__text _text _text--normal-font">
                WAITING FOR GAME
              </p>
            </div>
            <div class="profile-right">
              <div class="profile-right__image-container-container">
                <div class="profile-right__image-container">
                  <img
                    src="./assets/icons/player-two.png"
                    class="profile-right__image"
                    alt="Player Two Icon"
                  />
                </div>
              </div>
              <div
                class="profile-right__user-name-container _text _text--bold _text--normal-font"
              >
                <p class="profile-right__user-name">N/A</p>
                <p class="profile-right__letter">O</p>
              </div>
              <div class="profile-right__score-container">
                <p
                  class="profile-right__score _text _text--bold _text--normal-font --context-rg"
                >
                  0
                </p>
              </div>
            </div>
          </div>
          <div class="dashboard__part dashboard__right"></div>
        </div>
        <div class="dashboard-footer --context-md">
          <div class="dashboard-footer__part dashboard-footer__part--header">
            <h1
              class="dashboard-footer__header _text _text--bold _text--header-font"
            >
              Sebvu's Tic Tac Toe
            </h1>
          </div>
          <div
            class="dashboard-footer__part dashboard-footer__part--buttons --context-xl"
          >
            <button
              class="dashboard-footer__button dashboard-footer__button--theme"
            >
              <svg
                class="dashboard-footer__icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >

                />
              </svg>
            </button>
            <button
              class="dashboard-footer__button dashboard-footer__button--start"
            >
              <svg
                class="dashboard-footer__icon"
                version="1.1"
                xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                viewBox="0 0 455.896 455.896"
                xml:space="preserve"
              >

		C201.189,43.913,213.25,31.852,228.072,31.852z"
                  />
                </g>
              </svg>
            </button>
          </div>
        </div>
      </header>
      <section class="main-container --context-xxxl">
        <div class="game-board _text _text--normal-font">
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--one"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--two"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--three"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--four"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--five"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--six"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--seven"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--eight"></a>
          </div>
          <div tabindex="0" class="game-board__cell-container">
            <a class="game-board__cell game-board__cell--nine"></a>
          </div>
        </div>
      </section>
      <footer class="footer">
        <p class="footer__text _text _text--normal-font --context-rg">
          ❤️ Made with Love by
          <a
            class="footer__link"
            href="https://github.com/sebvu/top-tic-tac-toe"
            target="_blank"
            rel="noreferrer"
            >Sebvu</a
          >, courtesy of
          <a
            class="footer__link"
            href="https://www.theodinproject.com"
            target="_blank"
            rel="noreferrer"
            >The Odin Project</a
          >
          ❤️
        </p>
      </footer>
    </div>
    <dialog class="dialog --context-md" popover>
      <button class="dialog__exit-button">
        <svg
          class="dialog__exit-button-svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
        >
          <path
            d="M9,7L11,12L9,17H11L12,14.5L13,17H15L13,12L15,7H13L12,9.5L11,7H9M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2Z"
          />
        </svg>
      </button>
      <h1 class="dialog__header _text _text--header-font _text--bold">
        Create Game
      </h1>
      <p class="dialog__please _text _text--normal-font --context-rg">
        Please fill all required (<span class="dialog__please-span">*</span>)
        fields.
      </p>
      <p class="dialog__constraints _text _text--normal-font --context-sm">
        <strong>Name</strong> and <strong>Letter</strong> must be unique.
      </p>
      <form class="dialog__form --context-sm" action="" method="post">
        <div class="dialog__form-container dialog__form-container--player-one">
          <div class="player-div">
            <div class="dialog__image-container">
              <img
                class="dialog__image"
                src="./assets/icons/player-one.png"
                alt="Player One Icon"
              />
            </div>
          </div>
          <p class="player-p player-p--avatar _text _text--normal-font">
            <label tabindex="0" for="avatar-one">Select Player Icon</label>
            <input
              type="file"
              id="avatar-one"
              name="avatar_one"
              accept="image/*.png, image/*.jpeg, image/*.jpg"
            />
          </p>
          <p class="player-p player-p--name _text _text--normal-font">
            <label for="name-one">Name</label>
            <input
              type="text"
              id="name-one"
              name="name_one"
              minlength="1"
              maxlength="15"
              value="Player One"
              required
            />
            <span></span>
          </p>
          <div class="player-small-fields">
            <p
              class="player-small-fields-p player-small-fields-p--letter _text _text--normal-font"
            >
              <label for="letter-one">Letter</label>
              <input
                type="text"
                id="letter-one"
                name="letter_one"
                minlength="1"
                maxlength="1"
                size="1"
                value="X"
                required
              />
              <span></span>
            </p>
            <p
              class="player-small-fields-p player-small-fields-p--color _text _text--normal-font"
            >
              <label for="color-one">Color</label>
              <input
                type="color"
                id="color-one"
                name="color_one"
                value="cyan"
              />
            </p>
          </div>
        </div>
        <div class="dialog__form-container dialog__form-container--player-two">
          <div class="player-div">
            <div class="dialog__image-container">
              <img
                class="dialog__image"
                src="./assets/icons/player-two.png"
                alt="Player Two Icon"
              />
            </div>
          </div>
          <p class="player-p player-p--avatar _text _text--normal-font">
            <label tabindex="0" for="avatar-two">Select Player Icon</label>
            <input
              type="file"
              id="avatar-two"
              name="avatar_two"
              accept="image/*.png, image/*.jpeg, image/*.jpg"
            />
          </p>
          <p class="player-p player-p--name _text _text--normal-font">
            <label for="name-two">Name</label>
            <input
              type="text"
              id="name-two"
              name="name_two"
              minlength="1"
              maxlength="15"
              size="10"
              value="Player Two"
              required
            />
            <span></span>
          </p>
          <div class="player-small-fields">
            <p
              class="player-small-fields-p player-small-fields-p--letter _text _text--normal-font"
            >
              <label for="letter-two">Letter</label>
              <input
                type="text"
                id="letter-two"
                name="letter_two"
                minlength="1"
                maxlength="1"
                size="1"
                value="O"
                required
              />
              <span></span>
            </p>
            <p
              class="player-small-fields-p player-small-fields-p--color _text _text--normal-font"
            >
              <label for="color-two">Color</label>
              <input type="color" id="color-two" name="color_two" value="red" />
            </p>
          </div>
        </div>
        <div class="dialog__form-container dialog__form-container--setings">
          <p class="setting-p setting-p--infinite _text _text--normal-font">
            <label for="infinite">Infinite Rounds: </label>
            <input type="checkbox" id="infinite" name="setting_infinite" />
          </p>
          <p class="setting-p setting-p--rounds _text _text--normal-font">
            <label for="rounds">Rounds to Win:</label>
            <input
              type="number"
              id="rounds"
              step="1"
              min="1"
              max="100"
              value="5"
              name="settings_rounds"
              required
            />
            <span></span>
          </p>
        </div>
        <div class="dialog__form-container dialog__form-container--submit">
          <button
            submit
            class="dialog__form-submit-button _text _text--header-font _text--bold"
          >
            Submit
          </button>
        </div>
      </form>
    </dialog>
  </body>
</html>
