<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/framework.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/mobile-style.css" />
    <script src="./scripts/script.js" defer></script>
    <title>Jester's Tic Tac Toe</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="dashboard">
          <div class="dashboard__part dashboard__left"></div>
          <div class="dashboard__part dashboard__main --context-lg">
            <div class="profile-left">
              <div class="profile-left__image-container-container">
                <div class="profile-left__image-container">
                  <img
                    src="./assets/icons/player-one.png"
                    class="profile-left__image"
                    alt="Player One Icon"
                  />
                </div>
              </div>
              <div class="profile-left__user-name-container">
                <p
                  class="profile-left__user-name _text _text--bold _text--normal-font"
                >
                  Player Oneeee
                </p>
              </div>
              <div class="profile-left__score-container">
                <p
                  class="profile-left__score _text _text--bold _text--normal-font --context-rg"
                >
                  0
                </p>
              </div>
            </div>
            <div class="profile-right">
              <div class="profile-right__image-container-container">
                <div class="profile-right__image-container">
                  <img
                    src="./assets/icons/player-two.png"
                    class="profile-right__image"
                    alt="Player Two Icon"
                  />
                </div>
              </div>
              <div class="profile-right__user-name-container">
                <p
                  class="profile-right__user-name _text _text--bold _text--normal-font"
                >
                  Player Twoooo
                </p>
              </div>
              <div class="profile-right__score-container">
                <p
                  class="profile-right__score _text _text--bold _text--normal-font --context-rg"
                >
                  0
                </p>
              </div>
            </div>
          </div>
          <div class="dashboard__part dashboard__right"></div>
        </div>
        <div class="dashboard-footer --context-md">
          <div class="dashboard-footer__part dashboard-footer__part--header">
            <h1
              class="dashboard-footer__header _text _text--bold _text--header-font"
            >
              Sebvu's Tic Tac Toe
            </h1>
          </div>
          <div class="dashboard-footer__part dashboard-footer__part--buttons --context-xl">
            <button
              class="dashboard-footer__button dashboard-footer__button--theme"
            >

                class="dashboard-footer__icon"
                xmlns="http://www.w3.org/2000/svg"

                />

                  />
                </g>
              </svg>
            </button>
          </div>
        </div>
      </header>
      <section class="main-container">
        <div class="game-board">
          <div class="game-board__cell">
            <a class="game-board__cell-one"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-two"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-three"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-four"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-five"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-six"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-seven"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-eight"></a>
          </div>
          <div class="game-board__cell">
            <a class="game-board__cell-nine"></a>
          </div>
        </div>
      </section>
      <footer class="footer">
        <p class="footer__text _text _text--normal-font --context-rg">
          ❤️ Made with Love by
          <a
            href="https://github.com/sebvu/top-tic-tac-toe"
            target="_blank"
            rel="noreferrer"
            >Sebvu</a
          >, courtesy of
          <a
            href="https://www.theodinproject.com"
            target="_blank"
            rel="noreferrer"
            >The Odin Project</a
          >
          ❤️
        </p>
      </footer>
    </div>

  </body>
</html>
